<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Resume / CV</title>
    <style>
        /* Resets the page margins and makes it take up the full screen */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Hides the body scrollbars so only the PDF scrolls */
            background-color: #525659; /* A standard dark grey background for PDF viewers */
        }
        
        /* Container to hold the PDF */
        .pdf-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Styles the embed tag to fill the container */
        embed {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="pdf-container">
        <embed src="your-cv.pdf" type="application/pdf">
    </div>

</body>
</html>
